server:
  port: 8080

spring:
  application:
    name: ATM ISO8583 Gateway
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# ISO 8583 Network Connection Configuration
iso8583:
  host: 127.0.0.1          # Target host (PowerCARD / switch)
  port: 9000                # Target port
  connect-timeout: 5000     # ms
  read-timeout: 30000       # ms
  header-length: 4          # bytes used for message length prefix
  institution-id: "000001"  # Institution identifier

# Logging
logging:
  level:
    root: INFO
    com.atm: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/iso8583-gateway.log

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /api/actuator
  endpoint:
    health:
      show-details: always

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
